<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Premium Event Registration</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --primary: #4facfe;
            --secondary: #00f2fe;
            --bg-dark: #0f172a;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: white;
        }

        /* Moving Background Bubbles */
        .circles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden; z-index: -1;
        }
        .circles li {
            position: absolute; display: block; list-style: none;
            width: 20px; height: 20px; background: rgba(255, 255, 255, 0.1);
            animation: animate 25s linear infinite; bottom: -150px;
        }
        @keyframes animate {
            0%{ transform: translateY(0) rotate(0deg); opacity: 1; border-radius: 0; }
            100%{ transform: translateY(-1000px) rotate(720deg); opacity: 0; border-radius: 50%; }
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            width: 90%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            animation: scaleIn 0.6s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        h2 { margin-bottom: 25px; font-weight: 600; text-align: center; }

        .input-group {
            position: relative;
            margin-bottom: 20px;
            opacity: 0;
            animation: slideInRight 0.5s forwards;
        }

        /* Staggered Delay for Inputs */
        .input-group:nth-child(1) { animation-delay: 0.2s; }
        .input-group:nth-child(2) { animation-delay: 0.3s; }
        .input-group:nth-child(3) { animation-delay: 0.4s; }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            outline: none;
            color: white;
            font-size: 15px;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(79, 172, 254, 0.3);
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(79, 172, 254, 0.4);
        }

        button:active { transform: translateY(-1px); }

        #message {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            min-height: 20px;
            transition: 0.5s;
        }

        footer {
            margin-top: 30px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 1px;
        }
    </style>
</head>

<body>

    <ul class="circles">
        <li></li><li></li><li></li><li></li><li></li><li></li><li></li><li></li><li></li><li></li>
    </ul>

    <header>
        <h1>🎉 Event Registration</h1>
        <p>Your journey begins here.</p>
    </header>

    <div class="container">
        <h2>Join the Future</h2>

        <form id="form">
            <div class="input-group">
                <input type="text" id="name" placeholder="Full Name" required>
            </div>
            <div class="input-group">
                <input type="email" id="email" placeholder="Email Address" required>
            </div>
            <div class="input-group">
                <input type="tel" id="phone" placeholder="Phone Number" required>
            </div>

            <button type="submit" id="submitBtn">Secure My Spot</button>
        </form>

        <p id="message"></p>
    </div>

    <footer>
        © 2026 EVENT SYSTEM | DESIGNED BY FEBIN JOSE
    </footer>

    <script>
        const form = document.getElementById("form");
        const msg = document.getElementById("message");
        const btn = document.getElementById("submitBtn");

        form.addEventListener("submit", function(e) {
            e.preventDefault();
            const name = document.getElementById("name").value;

            // 1. Change button state
            btn.innerText = "Processing...";
            btn.style.opacity = "0.7";

            setTimeout(() => {
                // 2. Trigger Confetti
                confetti({
                    particleCount: 150,
                    spread: 70,
                    origin: { y: 0.6 },
                    colors: ['#4facfe', '#00f2fe', '#ffffff']
                });

                // 3. Show Success Message
                msg.style.color = "#00f2fe";
                msg.innerText = "Welcome aboard, " + name + "! ✨";
                
                // 4. Reset Button
                btn.innerText = "Registered!";
                btn.style.background = "#10b981";
                btn.style.opacity = "1";

                form.reset();
            }, 1000);
        });
    </script>

</body>
</html>
