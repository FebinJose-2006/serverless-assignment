<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Premium Event Registration</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --primary: #4facfe;
            --secondary: #00f2fe;
            --bg-dark: #0f172a;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: white;
        }

        /* Background Animation */
        .circles {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            z-index: -1;
        }

        .circles li {
            position: absolute;
            list-style: none;
            width: 20px; height: 20px;
            background: rgba(255,255,255,0.1);
            animation: animate 25s linear infinite;
            bottom: -150px;
        }

        @keyframes animate {
            0% { transform: translateY(0) rotate(0); opacity: 1; }
            100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; }
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        .container {
            width: 90%;
            max-width: 420px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: white;
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            opacity: 0.9;
        }

        #message {
            text-align: center;
            margin-top: 15px;
        }

        footer {
            margin-top: 20px;
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }
    </style>
</head>

<body>

<!-- Animated Background -->
<ul class="circles">
    <li></li><li></li><li></li><li></li><li></li>
    <li></li><li></li><li></li><li></li><li></li>
</ul>

<header>
    <h1>🎉 Event Registration</h1>
    <p>Your journey begins here</p>
</header>

<div class="container">
    <h2>Join the Future</h2>

    <form id="form">
        <input type="text" id="name" placeholder="Full Name" required>
        <input type="email" id="email" placeholder="Email Address" required>
        <input type="tel" id="phone" placeholder="Phone Number" required>

        <button type="submit" id="submitBtn">Secure My Spot</button>
    </form>

    <button onclick="showUsers()">📊 View Registrations</button>

    <p id="message"></p>
</div>

<footer>
    © 2026 EVENT SYSTEM | DESIGNED BY FEBIN JOSE
</footer>

<script>
    const form = document.getElementById("form");
    const msg = document.getElementById("message");
    const btn = document.getElementById("submitBtn");

    // Load users from localStorage
    let users = JSON.parse(localStorage.getItem("users")) || [];

    form.addEventListener("submit", function(e) {
        e.preventDefault();

        const name = document.getElementById("name").value;
        const email = document.getElementById("email").value;
        const phone = document.getElementById("phone").value;

        btn.innerText = "Processing...";
        btn.style.opacity = "0.7";

        setTimeout(() => {
            const userData = {
                name,
                email,
                phone,
                time: new Date().toLocaleString()
            };

            // Save to localStorage (database simulation)
            users.push(userData);
            localStorage.setItem("users", JSON.stringify(users));

            // Confetti 🎉
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#4facfe', '#00f2fe', '#ffffff']
            });

            // Success message
            msg.style.color = "#00f2fe";
            msg.innerText = "Welcome aboard, " + name + "! ✨";

            // Button update
            btn.innerText = "Registered!";
            btn.style.background = "#10b981";
            btn.style.opacity = "1";

            form.reset();

            console.log("📦 API Data:", users);

        }, 1000);
    });

    // REST API simulation
    function getUsersAPI() {
        return JSON.parse(localStorage.getItem("users")) || [];
    }

    // View users
    function showUsers() {
        const data = getUsersAPI();
        alert(JSON.stringify(data, null, 2));
    }
</script>

</body>
</html>
