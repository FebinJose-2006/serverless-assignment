<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | Cloud System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #4facfe;
            --accent: #00f2fe;
            --danger: #ef4444;
            --success: #10b981;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            background-image: radial-gradient(circle at 0% 0%, rgba(79, 172, 254, 0.15) 0%, transparent 50%);
            color: white;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .dashboard-container {
            max-width: 1000px;
            margin: auto;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            gap: 15px;
            flex-wrap: wrap;
        }

        h1 { margin: 0; font-size: 26px; letter-spacing: -1px; }

        /* Search & Controls */
        .controls { display: flex; gap: 15px; align-items: center; }
        
        .search-bar {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 10px 15px;
            border-radius: 10px;
            color: white;
            outline: none;
            transition: 0.3s;
            width: 200px;
        }
        .search-bar:focus { border-color: var(--primary); width: 250px; }

        .stat-card {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            display: inline-block;
            min-width: 180px;
            backdrop-filter: blur(10px);
        }

        .stat-card small { color: #94a3b8; text-transform: uppercase; font-size: 11px; font-weight: 600; }
        .stat-card div { font-size: 28px; font-weight: 600; color: var(--primary); }

        /* Table */
        .table-box {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 18px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        table { width: 100%; border-collapse: collapse; }
        
        th {
            background: rgba(255, 255, 255, 0.03);
            text-align: left;
            padding: 18px;
            font-size: 13px;
            color: #94a3b8;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
        }

        td { padding: 16px; border-bottom: 1px solid rgba(255, 255, 255, 0.02); font-size: 14px; }
        tr:hover td { background: rgba(255, 255, 255, 0.02); }

        /* Buttons */
        .btn {
            padding: 10px 18px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s ease;
            font-size: 13px;
        }

        .btn-back { background: var(--glass); color: white; border: 1px solid var(--border); }
        .btn-back:hover { background: white; color: #0f172a; }

        .btn-delete { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
        .btn-delete:hover { background: var(--danger); color: white; }

        .btn-export { background: var(--success); color: white; }
        .btn-export:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3); }

        .clear-link {
            background: transparent; color: #64748b; margin-top: 20px; text-decoration: underline;
        }

        @media (max-width: 600px) {
            .header-section { flex-direction: column; align-items: flex-start; }
            .search-bar { width: 100%; }
        }
    </style>
</head>

<body>

<div class="dashboard-container">
    <div class="header-section">
        <button class="btn btn-back" onclick="goBack()">⬅ Back to Form</button>
        <h1>📊 Admin Dashboard</h1>
        <div class="controls">
            <input type="text" id="search" class="search-bar" placeholder="Filter users..." onkeyup="filterUsers()">
            <button class="btn btn-export" onclick="exportCSV()">Export CSV</button>
        </div>
    </div>

    <div class="stat-card">
        <small>Total Registrations</small>
        <div id="count">0</div>
    </div>

    <div class="table-box">
        <table id="user-table">
            <thead>
                <tr>
                    <th>User</th>
                    <th>Contact Info</th>
                    <th>Timestamp</th>
                    <th style="text-align: right;">Action</th>
                </tr>
            </thead>
            <tbody id="table-body">
                </tbody>
        </table>
    </div>

    <button class="btn clear-link" onclick="clearAll()">Wipe Local Database</button>
</div>

<script>
    let users = JSON.parse(localStorage.getItem("users")) || [];
    const tableBody = document.getElementById("table-body");
    const countDisplay = document.getElementById("count");

    function loadData(filteredData = users) {
        tableBody.innerHTML = "";
        countDisplay.innerText = filteredData.length;

        if (filteredData.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding: 50px; color: #64748b;">No records found.</td></tr>`;
            return;
        }

        filteredData.forEach((user, index) => {
            const row = document.createElement('tr');
            // Staggered entry animation logic
            row.style.animation = `fadeIn 0.5s ease forwards ${index * 0.05}s`;
            row.style.opacity = "0";
            
            row.innerHTML = `
                <td>
                    <div style="font-weight:600">${user.name}</div>
                    <div style="font-size:12px; color:#64748b">${user.email}</div>
                </td>
                <td>${user.phone}</td>
                <td style="color:#94a3b8">${user.time || 'Today'}</td>
                <td style="text-align: right;">
                    <button class="btn btn-delete" onclick="deleteUser(${index})">Remove</button>
                </td>
            `;
            tableBody.appendChild(row);
        });
    }

    function filterUsers() {
        const query = document.getElementById("search").value.toLowerCase();
        const filtered = users.filter(user => 
            user.name.toLowerCase().includes(query) || 
            user.email.toLowerCase().includes(query)
        );
        loadData(filtered);
    }

    function deleteUser(index) {
        if(confirm("Permanently delete this entry?")) {
            users.splice(index, 1);
            localStorage.setItem("users", JSON.stringify(users));
            loadData();
        }
    }

    function exportCSV() {
        if(users.length === 0) return alert("Nothing to export!");
        let csv = "Name,Email,Phone,Time\n";
        users.forEach(u => csv += `${u.name},${u.email},${u.phone},${u.time}\n`);
        
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'user_data.csv';
        a.click();
    }

    function clearAll() {
        if (confirm("🚨 This will delete EVERY registration. Are you sure?")) {
            localStorage.removeItem("users");
            users = [];
            loadData();
        }
    }

    function goBack() { window.history.back(); }

    loadData();
</script>

</body>
</html>
